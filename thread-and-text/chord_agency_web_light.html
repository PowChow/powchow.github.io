<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Agency Web — Shared Verbs Across Corpus</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-chord@3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      background: #ffffff;
      color: #2a1e40;
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto auto auto 1fr;
      min-height: 100vh;
    }

    header {
      grid-column: 1/-1;
      padding: 18px 32px 12px;
      border-bottom: 1px solid #ddd4ea;
      display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    }
    header h1 { font-size: 1.1rem; color: #5a3a90; letter-spacing: 0.08em; }
    header .sub { font-size: 11px; color: #7a6a9a; }

    /* ── View toggle ── */
    #view-bar {
      grid-column: 1/-1;
      padding: 12px 32px;
      border-bottom: 1px solid #ddd4ea;
      display: flex; gap: 10px; align-items: center;
    }
    #view-bar span { font-size: 10px; color: #7a6a9a; letter-spacing: 0.1em; text-transform: uppercase; }
    .view-btn {
      font-size: 11px; padding: 5px 14px; border-radius: 20px;
      border: 1px solid #ccc4da; background: transparent;
      color: #5a3a90; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .view-btn.active { color: #5a3a90; border-color: #5a3a90; background: #eee8f5; }

    /* ── Insight ── */
    #insight {
      grid-column: 1/-1;
      padding: 11px 32px;
      background: #eee8f5;
      border-bottom: 1px solid #ddd4ea;
      font-size: 12px; color: #5a3a90; font-style: italic;
    }
    #insight strong { color: #3a2060; font-style: normal; }

    /* ── Main chart ── */
    #chart-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 24px 32px;
    }
    #main-svg { display: block; }

    /* chord styles */
    .group-arc   { cursor: pointer; stroke: #ffffff; stroke-width: 1.5px; }
    .ribbon      { cursor: pointer; transition: fill-opacity 0.15s; }
    .ribbon:hover { stroke: #3a2060; stroke-width: 0.8px; fill-opacity: 0.9 !important; }
    .ribbon.dimmed { fill-opacity: 0.06 !important; }
    .group-label { pointer-events: none; font-size: 11px; }

    /* force styles */
    .book-node   { cursor: pointer; stroke: #ffffff; stroke-width: 1.5px; }
    .verb-node   { cursor: pointer; }
    .node-label  { pointer-events: none; font-size: 10px; }
    .force-link  { stroke-opacity: 0.35; }

    /* ── Sidebar ── */
    #sidebar {
      border-left: 1px solid #ddd4ea;
      padding: 20px 18px;
      overflow-y: auto;
      grid-row: 3/-1;
    }
    #sidebar h2 { font-size: 10px; color: #7a6a9a; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }

    .book-card {
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid #e8e0f0;
    }
    .book-card .bc-title { font-size: 11px; margin-bottom: 2px; }
    .book-card .bc-meta  { font-size: 9px; color: #7a6a9a; margin-bottom: 5px; }
    .verb-pills { display: flex; flex-wrap: wrap; gap: 3px; }
    .verb-pill  { font-size: 9px; padding: 1px 6px; border-radius: 8px; }
    .verb-pill.agent   { border: 1px solid #ccc4da; color: #5a3a90; background: #eee8f5; }
    .verb-pill.patient { border: 1px solid #ddd4ea; color: #7a6a9a; background: #f5f0fa; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed; padding: 12px 16px;
      background: rgba(255,255,255,0.97); border: 1px solid #ccc4da;
      border-radius: 8px; font-size: 12px; max-width: 360px;
      pointer-events: none; opacity: 0; z-index: 9999; line-height: 1.8;
      box-shadow: 0 2px 12px rgba(90,58,144,0.15);
      transition: opacity 0.1s; color: #2a1e40;
    }

    #no-data {
      grid-column: 1/-1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px; color: #7a6a9a; font-size: 14px; line-height: 2;
    }
    #no-data code { background: #130c22; padding: 2px 6px; border-radius: 3px; color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>Agency Web — Shared Verbs Across Corpus</h1>
    <span class="sub" id="hdr-sub">Loading…</span>
  </header>

  <div id="view-bar">
    <span>View:</span>
    <button class="view-btn active" data-view="chord">Chord — book similarities</button>
    <button class="view-btn"        data-view="force">Web — books + verbs</button>
  </div>

  <div id="insight"></div>

  <div id="chart-wrap">
    <svg id="main-svg"></svg>
  </div>

  <div id="sidebar">
    <h2>Protagonist verbs</h2>
    <div id="book-list"></div>
  </div>

  <div id="tooltip"></div>

  <script>
    const tooltip = document.getElementById("tooltip");
    const hide    = () => { tooltip.style.opacity = 0; };
    document.addEventListener("mousemove", e => {
      if (tooltip.style.opacity > 0) {
        tooltip.style.left = Math.min(e.pageX + 16, window.innerWidth - 380) + "px";
        tooltip.style.top  = Math.min(e.pageY + 10, window.innerHeight - 200) + "px";
      }
    });

    const PERIOD_COLOR = { pre_1920: "#5a40b0", at_1920: "#9060d0", post_1920: "#c89030" };
    const PERIOD_LABEL = { pre_1920: "Pre-1920", at_1920: "1920", post_1920: "Post-1920" };
    const GENDER_COLOR = { female: "#e070b0", male: "#50b0e8" };

    let activeView = "chord";
    let globalData = null;

    // ── Helpers ────────────────────────────────────────────────────────────────
    // Verbs too common to be meaningful connectors
    const SKIP_VERBS = new Set([
      "was","were","is","are","be","been","being",
      "had","have","has","did","do","does",
      "got","get","gets","went","go","goes",
      "said","say","says",           // nearly universal — keep only if rare
      "came","come","comes",
      "made","make","makes",
      "took","take","takes",
      "knew","know","knows",
      "saw","see","sees",
      "felt","feel","feels",
      "thought","think","thinks",
      "looked","look","looks",       // very common — will still match when meaningful
      "'s","'m","'re","s","n't",    // contractions / tokenization artifacts
    ]);

    function topAgentVerbs(book, n = 20) {
      return (book.top_verbs.agent || [])
        .slice(0, n)
        .map(v => v.verb)
        .filter(v => !SKIP_VERBS.has(v) && v.length > 2 && /^[a-z]/.test(v));
    }
    function topPatientVerbs(book, n = 20) {
      return (book.top_verbs.patient || [])
        .slice(0, n)
        .map(v => v.verb)
        .filter(v => !SKIP_VERBS.has(v) && v.length > 2 && /^[a-z]/.test(v));
    }
    function sharedVerbs(a, b) {
      const setA = new Set(topAgentVerbs(a, 20));
      return topAgentVerbs(b, 20).filter(v => setA.has(v));
    }

    // ── Chord diagram ──────────────────────────────────────────────────────────
    function drawChord(books) {
      const n     = books.length;
      const idx   = {};
      books.forEach((b, i) => { idx[b.id] = i; });

      // Symmetric matrix: weight = number of shared agent verbs
      const matrix = Array.from({ length: n }, () => new Array(n).fill(0));
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const shared = sharedVerbs(books[i], books[j]);
          if (shared.length > 0) {
            matrix[i][j] = shared.length;
            matrix[j][i] = shared.length;
          }
        }
      }

      const W = 600, H = 600;
      const outerR = Math.min(W, H) / 2 - 70;
      const innerR = outerR - 18;

      const svg = d3.select("#main-svg").attr("viewBox", [0,0,W,H])
        .attr("width", W).attr("height", H).html("");
      const g = svg.append("g").attr("transform", `translate(${W/2},${H/2})`);

      const chordFn = d3.chord().padAngle(0.05).sortSubgroups(d3.descending).sortChords(d3.descending);
      const chords  = chordFn(matrix);
      const groups  = chords.groups || [];
      const ribbons = chords.filter(d => d.source.value > 0);

      const arc    = d3.arc().innerRadius(innerR).outerRadius(outerR);
      const ribbon = d3.ribbon().radius(innerR - 2);

      // Status line
      d3.select("#hdr-sub").text(
        `${books.length} texts  ·  ${ribbons.length} meaningful verb connections`
      );

      if (ribbons.length === 0) {
        g.append("text").attr("text-anchor","middle").attr("fill","#6a50a0")
          .attr("y",-10).attr("font-size",13)
          .text("No shared meaningful verbs between books.");
        g.append("text").attr("text-anchor","middle").attr("fill","#7a6a9a")
          .attr("y",14).attr("font-size",11)
          .text("(hover the arcs to see each protagonist's verbs)");
        // Still draw arcs even with no ribbons
      }

      // Ribbons
      const rPaths = g.append("g").selectAll("path")
        .data(ribbons).join("path")
        .attr("class","ribbon")
        .attr("d", ribbon)
        .attr("fill", d => PERIOD_COLOR[books[d.source.index].period])
        .attr("fill-opacity", 0.45)
        .on("mouseover", (e, d) => {
          const a = books[d.source.index], b = books[d.target.index];
          const shared = sharedVerbs(a, b);

          // Look up per-book counts for each shared verb
          const aVerbMap = Object.fromEntries((a.top_verbs.agent||[]).map(v=>[v.verb,v.count]));
          const bVerbMap = Object.fromEntries((b.top_verbs.agent||[]).map(v=>[v.verb,v.count]));

          const pills = shared.map(v => {
            const ca = aVerbMap[v] || "?", cb = bVerbMap[v] || "?";
            return `<span style="display:inline-block;margin:2px 3px;padding:2px 8px;
                      border-radius:10px;border:1px solid #5a40a0;
                      background:#eee8f5;color:#5a3a90;font-style:normal;font-size:11px">
                      ${v}
                      <span style="color:#6a50a0;font-size:9px">
                        ${ca}× / ${cb}×
                      </span>
                    </span>`;
          }).join("");

          tooltip.innerHTML =
            `<div style="margin-bottom:6px">
               <strong style="color:${PERIOD_COLOR[a.period]}">${a.protagonist}</strong>
               <span style="color:#7a6a9a;font-size:10px"> (${a.year})</span>
               <span style="color:#5a4a7a"> ↔ </span>
               <strong style="color:${PERIOD_COLOR[b.period]}">${b.protagonist}</strong>
               <span style="color:#7a6a9a;font-size:10px"> (${b.year})</span>
             </div>
             <div style="font-size:9px;color:#7a6a9a;margin-bottom:5px">
               ${shared.length} shared acting verb${shared.length !== 1 ? "s" : ""}
               <span style="color:#3a2060"> — counts: ${a.protagonist} / ${b.protagonist}</span>
             </div>
             <div>${pills}</div>`;
          tooltip.style.opacity = 1;
          tooltip.style.left = (e.pageX+14)+"px";
          tooltip.style.top  = (e.pageY+8)+"px";
          rPaths.classed("dimmed", r => r !== d);
        })
        .on("mouseout", () => { hide(); rPaths.classed("dimmed", false); });

      // Arcs
      g.append("g").selectAll("path")
        .data(groups).join("path")
        .attr("class","group-arc")
        .attr("d", arc)
        .attr("fill", d => PERIOD_COLOR[books[d.index].period])
        .attr("fill-opacity", 0.9)
        .on("mouseover", (e, d) => {
          const b = books[d.index];
          const agVbs = topAgentVerbs(b, 5).join(", ");
          tooltip.innerHTML =
            `<strong style="color:${PERIOD_COLOR[b.period]}">${b.protagonist}</strong>
             <span style="color:#7a6a9a"> — ${b.title}</span><br>
             <span style="color:${GENDER_COLOR[b.author_gender]}">${b.author}</span>
             · ${b.year}<br>
             <span style="color:#5a3a90">agency: ${Math.round(b.ratio*100)}%</span><br>
             <span style="color:#6a50a0">acting: ${agVbs}</span>`;
          tooltip.style.opacity = 1;
          tooltip.style.left = (e.pageX+14)+"px";
          tooltip.style.top  = (e.pageY+8)+"px";
          rPaths.classed("dimmed", r =>
            r.source.index !== d.index && r.target.index !== d.index);
        })
        .on("mouseout", () => { hide(); rPaths.classed("dimmed", false); });

      // Labels
      const labelGs = g.append("g").selectAll("g")
        .data(groups).join("g")
        .attr("class","group-label")
        .attr("transform", d => {
          const a = (d.startAngle + d.endAngle) / 2 - Math.PI / 2;
          return `translate(${Math.cos(a)*(outerR+22)},${Math.sin(a)*(outerR+22)})`;
        })
        .attr("text-anchor", d => {
          const a = (d.startAngle + d.endAngle) / 2 - Math.PI / 2;
          if (Math.abs(Math.cos(a)) < 0.15) return "middle";
          return Math.cos(a) > 0 ? "start" : "end";
        });

      // protagonist name
      labelGs.append("text")
        .attr("dy", "-0.2em")
        .attr("fill", d => PERIOD_COLOR[books[d.index].period])
        .attr("font-size", "11px")
        .attr("font-weight", "600")
        .text(d => books[d.index].protagonist);

      // novel title (smaller, muted)
      labelGs.append("text")
        .attr("dy", "1em")
        .attr("fill", d => PERIOD_COLOR[books[d.index].period])
        .attr("font-size", "8.5px")
        .attr("opacity", 0.65)
        .text(d => {
          const t = books[d.index].title;
          return t.length > 22 ? t.slice(0, 21) + "…" : t;
        });

      // Legend
      const legG = g.append("g").attr("transform", `translate(${-W/2+12},${H/2-70})`);
      Object.entries(PERIOD_LABEL).forEach(([p, lbl], i) => {
        legG.append("circle").attr("cx",7).attr("cy",i*16).attr("r",5)
          .attr("fill", PERIOD_COLOR[p]);
        legG.append("text").attr("x",16).attr("y",i*16+4)
          .attr("font-size",9).attr("fill","#7a6a9a").text(lbl);
      });
      Object.entries({female:"F-authored",male:"M-authored"}).forEach(([g2,lbl],i) => {
        legG.append("circle").attr("cx",7).attr("cy",(i+4)*16).attr("r",4)
          .attr("fill","none").attr("stroke",GENDER_COLOR[g2]).attr("stroke-width",2);
        legG.append("text").attr("x",16).attr("y",(i+4)*16+4)
          .attr("font-size",9).attr("fill","#7a6a9a").text(lbl);
      });
    }

    // ── Force-directed web ─────────────────────────────────────────────────────
    function drawForce(books) {
      const W = 700, H = 620;
      const svg = d3.select("#main-svg").attr("viewBox",[0,0,W,H])
        .attr("width",W).attr("height",H).html("");

      // Collect top agent verbs across all books
      const verbCount = {};
      books.forEach(b => {
        topAgentVerbs(b, 6).forEach(v => {
          verbCount[v] = (verbCount[v] || 0) + 1;
        });
      });
      // Only verbs that appear in ≥2 books
      const sharedVerbSet = new Set(
        Object.entries(verbCount).filter(([,c]) => c >= 2).map(([v]) => v)
      );

      // Nodes
      const bookNodes = books.map(b => ({
        id: `book_${b.id}`, type: "book", book: b,
        label: b.protagonist,
        color: PERIOD_COLOR[b.period],
        border: GENDER_COLOR[b.author_gender],
        r: 12 + b.ratio * 18,
      }));

      const verbNodes = [...sharedVerbSet].map(v => ({
        id: `verb_${v}`, type: "verb", label: v,
        color: "#7a6a9a", r: 6 + verbCount[v] * 2,
      }));

      const nodes = [...bookNodes, ...verbNodes];
      const nodeIdx = {};
      nodes.forEach((n, i) => { nodeIdx[n.id] = i; });

      // Links: book → shared verbs
      const links = [];
      books.forEach(b => {
        topAgentVerbs(b, 6).forEach(v => {
          if (sharedVerbSet.has(v)) {
            links.push({
              source: `book_${b.id}`,
              target: `verb_${v}`,
              verb: v,
              color: PERIOD_COLOR[b.period],
            });
          }
        });
      });

      const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(90).strength(0.4))
        .force("charge", d3.forceManyBody().strength(-220))
        .force("center", d3.forceCenter(W/2, H/2))
        .force("collision", d3.forceCollide(d => d.r + 8));

      const linkSel = svg.append("g").selectAll("line")
        .data(links).join("line")
        .attr("class","force-link")
        .attr("stroke", d => d.color)
        .attr("stroke-width", 1.2);

      // Book nodes
      const bookSel = svg.append("g").selectAll("circle.book-node")
        .data(bookNodes).join("circle")
        .attr("class","book-node")
        .attr("r", d => d.r)
        .attr("fill", d => d.color)
        .attr("fill-opacity", 0.8)
        .attr("stroke", d => d.border)
        .attr("stroke-width", 2.5)
        .call(d3.drag()
          .on("start", (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
          .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
          .on("end",   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
        .on("mouseover", (e, d) => {
          const b = d.book;
          tooltip.innerHTML =
            `<strong style="color:${d.color}">${b.protagonist}</strong>
             — ${b.title}<br>
             <span style="color:${d.border}">${b.author}</span> · ${b.year}<br>
             <span style="color:#5a3a90">agency: ${Math.round(b.ratio*100)}%</span>`;
          tooltip.style.opacity=1;
          tooltip.style.left=(e.pageX+14)+"px";
          tooltip.style.top=(e.pageY+8)+"px";
        })
        .on("mouseout", hide);

      // Verb nodes
      const verbSel = svg.append("g").selectAll("circle.verb-node")
        .data(verbNodes).join("circle")
        .attr("class","verb-node")
        .attr("r", d => d.r)
        .attr("fill", "#1e1430")
        .attr("stroke", "#5a4090")
        .attr("stroke-width", 1.5)
        .on("mouseover", (e, d) => {
          const users = books.filter(b => topAgentVerbs(b,6).includes(d.label))
            .map(b => b.protagonist).join(", ");
          tooltip.innerHTML =
            `<strong style="color:#5a3a90">${d.label}</strong><br>
             used by: ${users}<br>
             <span style="color:#7a6a9a">appears in ${verbCount[d.label]} texts</span>`;
          tooltip.style.opacity=1;
          tooltip.style.left=(e.pageX+14)+"px";
          tooltip.style.top=(e.pageY+8)+"px";
        })
        .on("mouseout", hide);

      // Labels
      const labelSel = svg.append("g").selectAll("text.node-label")
        .data(nodes).join("text")
        .attr("class","node-label")
        .attr("text-anchor","middle")
        .attr("dy","0.35em")
        .attr("fill", d => d.type === "book" ? d.color : "#6a50a0")
        .attr("font-size", d => d.type === "book" ? 11 : 9)
        .text(d => d.label);

      sim.on("tick", () => {
        linkSel
          .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        bookSel.attr("cx", d => d.x).attr("cy", d => d.y);
        verbSel.attr("cx", d => d.x).attr("cy", d => d.y);
        labelSel.attr("x", d => d.x).attr("y", d => d.type === "book" ? d.y + d.r + 10 : d.y);
      });
    }

    // ── Sidebar ────────────────────────────────────────────────────────────────
    function buildSidebar(books) {
      const listEl = document.getElementById("book-list");
      listEl.innerHTML = "";
      [...books].sort((a,b) => a.year - b.year).forEach(b => {
        const col = PERIOD_COLOR[b.period];
        const agVbs  = topAgentVerbs(b, 5);
        const ptVbs  = topPatientVerbs(b, 4);
        const div = document.createElement("div");
        div.className = "book-card";
        div.innerHTML = `
          <div class="bc-title" style="color:${col}">
            ${b.protagonist} — <em>${b.title.replace(/^The /,"")}</em>
          </div>
          <div class="bc-meta">
            <span style="color:${GENDER_COLOR[b.author_gender]}">${b.author}</span>
            · ${b.year} · ${Math.round(b.ratio*100)}% agent
          </div>
          <div class="verb-pills">
            ${agVbs.map(v=>`<span class="verb-pill agent">${v}</span>`).join("")}
            ${ptVbs.map(v=>`<span class="verb-pill patient">${v}</span>`).join("")}
          </div>`;
        listEl.appendChild(div);
      });
    }

    // ── Load & render ──────────────────────────────────────────────────────────
    d3.json("agency_corpus.json?v=" + Date.now()).then(data => {
      globalData = data.books;

      document.getElementById("hdr-sub").textContent =
        `${globalData.length} texts  ·  chord = shared acting verbs  ·  web = verb clusters`;

      // Insight: find most-shared verb
      const verbFreq = {};
      globalData.forEach(b => topAgentVerbs(b,8).forEach(v => {
        verbFreq[v] = (verbFreq[v]||0) + 1;
      }));
      const topVerb = Object.entries(verbFreq).sort((a,b)=>b[1]-a[1])[0];
      const topVerb2 = Object.entries(verbFreq).sort((a,b)=>b[1]-a[1])[1];

      document.getElementById("insight").innerHTML =
        `The most universal acting verb across all ${globalData.length} protagonists is
         <strong>"${topVerb[0]}"</strong> (${topVerb[1]} texts) followed by
         <strong>"${topVerb2[0]}"</strong> (${topVerb2[1]} texts).
         Chord width = how many verbs two protagonists share. Web = which books
         cluster around the same verbs.`;

      buildSidebar(globalData);
      drawChord(globalData);

      document.querySelectorAll(".view-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          activeView = btn.dataset.view;
          if (activeView === "chord") drawChord(globalData);
          else                       drawForce(globalData);
        });
      });

    }).catch(() => {
      document.body.innerHTML = `<div id="no-data">
        <p><strong style="color:#c66">agency_corpus.json not found.</strong></p>
